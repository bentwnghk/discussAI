version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: discussai-db
    restart: always
    environment:
      POSTGRES_USER: discussai
      POSTGRES_PASSWORD: discussai
      POSTGRES_DB: discussai
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U discussai"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: discussai-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://discussai:discussai@db:5432/discussai
      OPENAI_BASE_URL: https://api.mr5ai.com/v1
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL_NORMAL: ${OPENAI_MODEL_NORMAL:-gpt-4.1-mini}
      OPENAI_MODEL_DEEP: ${OPENAI_MODEL_DEEP:-gpt-4.1}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PLAN_A_CREDITS: ${STRIPE_PLAN_A_CREDITS:-100}
      STRIPE_PLAN_A_PRICE_HKD: ${STRIPE_PLAN_A_PRICE_HKD:-15}
      STRIPE_PLAN_B_CREDITS: ${STRIPE_PLAN_B_CREDITS:-400}
      STRIPE_PLAN_B_PRICE_HKD: ${STRIPE_PLAN_B_PRICE_HKD:-49}
      WELCOME_CREDITS: ${WELCOME_CREDITS:-20}
      GENERATION_COST: ${GENERATION_COST:-10}
    volumes:
      - audio_data:/app/tmp/audio
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  audio_data:
